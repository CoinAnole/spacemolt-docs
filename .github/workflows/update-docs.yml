name: Update docs

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Ensure branch dispatch
        if: ${{ !startsWith(github.ref, 'refs/heads/') }}
        run: |
          echo "This workflow must be run from a branch, not ${GITHUB_REF}." >&2
          exit 1

      - name: Refresh docs
        run: bash scripts/update-docs.sh

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No documentation changes to commit."
            exit 0
          fi

          version="$(jq -r '.info["x-gameserver-version"] // empty' openapi.json)"
          if [[ -z "$version" ]]; then
            echo "Could not determine SpaceMolt version from openapi.json" >&2
            exit 1
          fi
          if [[ ! "$version" =~ ^v[0-9] ]]; then
            echo "Unexpected SpaceMolt version in openapi.json: $version" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "$version"
          git push origin "HEAD:${GITHUB_REF_NAME}"
